[build]
  publish = "."
  command = "npm run build"

# Cache control for JS files - no caching during development
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Legacy contract link from previous emails now routes to in-app digital signer.
[[redirects]]
  from = "/assets/contracts/Contracrt.docx"
  to = "/#/vendor-contract"
  status = 302
  force = true

# Single Page App redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
